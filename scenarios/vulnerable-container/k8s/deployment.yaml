apiVersion: apps/v1
kind: Deployment
metadata:
  name: vuln-app
  namespace: __NAMESPACE__
  labels:
    app: vuln-app
    c2c-scenario: vulnerable-container
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vuln-app
  template:
    metadata:
      labels:
        app: vuln-app
        c2c-scenario: vulnerable-container
    spec:
      containers:
        - name: vuln-app
          image: __IMAGE__
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vuln-app
  namespace: __NAMESPACE__
spec:
  type: ClusterIP
  selector:
    app: vuln-app
  ports:
    - port: 80
      targetPort: 3000